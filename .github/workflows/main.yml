name: Build Formix

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  APP_NAME: Formix
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'format_factory/requirements.txt'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r format_factory/requirements.txt
          pip install pyinstaller
          
      - name: Build with PyInstaller
        run: |
          Remove-Item -Recurse -Force build, dist -ErrorAction SilentlyContinue
          pyinstaller --clean formix.spec
          
      - name: Package artifacts
        shell: powershell
        run: |
          if (Test-Path "dist\Formix.exe") {
            Compress-Archive -Path "dist\Formix.exe" -DestinationPath "dist\${{ env.APP_NAME }}-Windows.zip" -Force
          } elseif (Test-Path "dist\Formix") {
            Compress-Archive -Path "dist\Formix" -DestinationPath "dist\${{ env.APP_NAME }}-Windows.zip" -Force
          }
          
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows
          path: dist/*.zip
          retention-days: 30

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'format_factory/requirements.txt'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r format_factory/requirements.txt
          pip install pyinstaller
          
      - name: Build with PyInstaller
        run: |
          rm -rf build dist
          pyinstaller --clean formix.spec
          
      - name: Package artifacts
        run: |
          cd dist
          if [ -d "Formix.app" ]; then
            zip -r ../${{ env.APP_NAME }}-macOS.zip Formix.app
          elif [ -f "Formix" ]; then
            zip -r ../${{ env.APP_NAME }}-macOS.zip Formix
          elif [ -d "Formix" ]; then
            zip -r ../${{ env.APP_NAME }}-macOS.zip Formix
          fi
          cd ..
          
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS
          path: ${{ env.APP_NAME }}-macOS.zip
          retention-days: 30

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'format_factory/requirements.txt'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libegl1 \
            libopengl0 \
            libegl1-mesa \
            libxkbcommon0
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r format_factory/requirements.txt
          pip install pyinstaller
          
      - name: Build with PyInstaller
        run: |
          rm -rf build dist
          pyinstaller --clean formix.spec
          
      - name: Package artifacts
        run: |
          cd dist
          if [ -f "Formix" ]; then
            chmod +x Formix
            zip -r ../${{ env.APP_NAME }}-Linux.zip Formix
          elif [ -d "Formix" ]; then
            chmod +x Formix/Formix
            zip -r ../${{ env.APP_NAME }}-Linux.zip Formix
          fi
          cd ..
          
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux
          path: ${{ env.APP_NAME }}-Linux.zip
          retention-days: 30

  create-release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          
      - name: Display structure of downloaded files
        run: ls -R ./artifacts
        
      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/*/*.zip release/
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
